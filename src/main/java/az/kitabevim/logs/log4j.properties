#root logger
log4j.rootLogger = DEBUG, file
#appender
log4j.appender.file = org.apache.log4j.RollingFileAppender
log4j.appender.file.File = target/logs/output.log
log4j.appender.file.MaxFileSize = 2MB
log4j.appender.file.MaxBackupIndex = 3
log4j.appender.file.layout.type=PatternLayout
log4j.appender.file.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
log4j.appender.file.filter.threshold.type = ThresholdFilter
log4j.appender.file.filter.threshold.level = info
log4j.appender.file.Append = false
#layout
log4j.appender.file.layout = org.apache.log4j.PatternLayout